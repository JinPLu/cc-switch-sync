# ~/.cc-remote/config.ini  (Mac/Linux)
# %USERPROFILE%\.cc-remote\config.ini  (Windows)

language=auto                # zh | en | auto
theme=color                  # color | plain  (or set NO_COLOR=1)
icon_set=auto                # auto | unicode | ascii
default_server=              # set a name to skip the picker
sync_codex=true
sync_codex_auth=confirm      # confirm | true | false
history_include_codex=false
enable_plugins=claude,codex
